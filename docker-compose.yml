# docker-compose.yml — SRV_MAIN (192.168.50.10)
# RP06 — PRA/PCA IRIS Nice | NVTech
version: '3.8'

services:
  openldap:
    image: osixia/openldap:1.5.0
    container_name: openldap
    environment:
      LDAP_ORGANISATION: "IRIS Nice"
      LDAP_DOMAIN: "iris.local"
      LDAP_ADMIN_PASSWORD: "adminpassword"
    ports:
      - "389:389"
      - "636:636"
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d
    restart: unless-stopped

  phpldapadmin:
    image: osixia/phpldapadmin
    container_name: phpldapadmin
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: openldap
    ports:
      - "8080:80"
    depends_on:
      - openldap
    restart: unless-stopped

  freeradius:
    image: freeradius/freeradius-server:3.2.3
    container_name: freeradius
    ports:
      - "1812:1812/udp"
      - "1813:1813/udp"
    volumes:
      - ./freeradius:/etc/freeradius/3.0
    restart: unless-stopped

  nextcloud-db:
    image: mariadb:10.6
    container_name: nextcloud-db
    environment:
      MYSQL_ROOT_PASSWORD: RootDB_IRIS_2026!
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: NextcloudDB_IRIS_2026!
    volumes:
      - nextcloud_db:/var/lib/mysql
    restart: unless-stopped

  nextcloud:
    image: nextcloud:apache
    container_name: nextcloud
    ports:
      - "80:80"
    environment:
      MYSQL_HOST: nextcloud-db
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_PASSWORD: NextcloudDB_IRIS_2026!
    volumes:
      - nextcloud_data:/var/www/html
    depends_on:
      - nextcloud-db
    restart: unless-stopped

  wg-easy:
    image: weejewel/wg-easy
    container_name: wg-easy
    environment:
      WG_HOST: 192.168.50.50
      PASSWORD: WireGuard_IRIS_2026!
    ports:
      - "51820:51820/udp"
      - "51821:51821/tcp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped

  clamav:
    image: clamav/clamav:1.4_base
    container_name: clamav
    ports:
      - "3310:3310"
    restart: unless-stopped

  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    restart: unless-stopped

volumes:
  ldap_data:
  ldap_config:
  nextcloud_db:
  nextcloud_data:
  portainer_data: